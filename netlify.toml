# Netlify configuration for Omega Attire

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/reviews"
  to   = "/reviews.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to   = "/gallery.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200
